<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  version="1.1" width="881px" height="181px" viewBox="-0.5 -0.5 881 181"
  content="&lt;mxfile host=&quot;app.diagrams.net&quot;&gt;&lt;diagram name=&quot;Evaluation Flow&quot; id=&quot;eval-flow&quot;&gt;&lt;mxGraphModel&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;"
  style="background-color: white;">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6C8EBF"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#82B366"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#B85450"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D6B656"/>
    </marker>
  </defs>
  <g>
    <!-- Step 1: Agent Status -->
    <rect x="10" y="40" width="120" height="50" rx="8" ry="8" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.5"/>
    <text x="70" y="60" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="#333">Agent Status</text>
    <text x="70" y="76" text-anchor="middle" font-family="Helvetica" font-size="9" fill="#666">active?</text>

    <!-- Arrow -->
    <line x1="130" y1="65" x2="155" y2="65" stroke="#6C8EBF" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 2: Access Profile -->
    <rect x="160" y="40" width="120" height="50" rx="8" ry="8" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
    <text x="220" y="60" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="#333">Access Profile</text>
    <text x="220" y="76" text-anchor="middle" font-family="Helvetica" font-size="9" fill="#666">agent-level rules</text>

    <!-- Arrow -->
    <line x1="280" y1="65" x2="305" y2="65" stroke="#6C8EBF" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 3: Tenant Policies -->
    <rect x="310" y="40" width="120" height="50" rx="8" ry="8" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
    <text x="370" y="60" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="#333">Tenant Policies</text>
    <text x="370" y="76" text-anchor="middle" font-family="Helvetica" font-size="9" fill="#666">org-wide rules</text>

    <!-- Arrow -->
    <line x1="430" y1="65" x2="455" y2="65" stroke="#6C8EBF" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 4: Budget Check -->
    <rect x="460" y="40" width="120" height="50" rx="8" ry="8" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
    <text x="520" y="60" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="#333">Budget Check</text>
    <text x="520" y="76" text-anchor="middle" font-family="Helvetica" font-size="9" fill="#666">limits ok?</text>

    <!-- Arrow -->
    <line x1="580" y1="65" x2="605" y2="65" stroke="#6C8EBF" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 5: Approval Check -->
    <rect x="610" y="40" width="120" height="50" rx="8" ry="8" fill="#F8CECC" stroke="#B85450" stroke-width="1.5"/>
    <text x="670" y="60" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="#333">Approval Check</text>
    <text x="670" y="76" text-anchor="middle" font-family="Helvetica" font-size="9" fill="#666">pre-approved?</text>

    <!-- Decision diamond -->
    <polygon points="780,65 820,35 860,65 820,95" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="2"/>
    <text x="820" y="69" text-anchor="middle" font-family="Helvetica" font-size="10" font-weight="bold" fill="#333">?</text>

    <!-- Arrow to diamond -->
    <line x1="730" y1="65" x2="780" y2="65" stroke="#6C8EBF" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Outcomes -->
    <!-- Allow (top-right) -->
    <rect x="810" y="0" width="70" height="24" rx="6" ry="6" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
    <text x="845" y="16" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="#2D7600">✅ Allow</text>
    <line x1="820" y1="35" x2="840" y2="24" stroke="#82B366" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

    <!-- Deny (bottom-left) -->
    <rect x="720" y="115" width="70" height="24" rx="6" ry="6" fill="#F8CECC" stroke="#B85450" stroke-width="1.5"/>
    <text x="755" y="131" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="#AE4132">❌ Deny</text>
    <line x1="810" y1="85" x2="765" y2="115" stroke="#B85450" stroke-width="1.5" marker-end="url(#arrowRed)"/>

    <!-- Require Approval (bottom-right) -->
    <rect x="850" y="115" width="30" height="24" rx="6" ry="6" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
    <text x="865" y="131" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="#9C6500">⏸️</text>
    <line x1="830" y1="85" x2="860" y2="115" stroke="#D6B656" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Title -->
    <text x="440" y="165" text-anchor="middle" font-family="Helvetica" font-size="12" font-weight="bold" fill="#333">POST /governance/evaluate — Unified Decision Pipeline</text>
    <text x="440" y="178" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#666">Precedence: deny > require_approval > allow | Tenant policies override agent profiles</text>
  </g>
</svg>
