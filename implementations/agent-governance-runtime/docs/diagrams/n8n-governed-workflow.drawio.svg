<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  version="1.1" width="701px" height="201px" viewBox="-0.5 -0.5 701 201"
  content="&lt;mxfile host=&quot;app.diagrams.net&quot;&gt;&lt;diagram name=&quot;N8N Flow&quot; id=&quot;n8n-flow&quot;&gt;&lt;mxGraphModel&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;"
  style="background-color: white;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6C8EBF"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#82B366"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#B85450"/>
    </marker>
  </defs>
  <g>
    <!-- Title -->
    <text x="350" y="18" text-anchor="middle" font-family="Helvetica" font-size="13" font-weight="bold" fill="#333">Governed N8N Workflow Pattern</text>

    <!-- Step 1: Trigger -->
    <rect x="10" y="55" width="120" height="55" rx="8" ry="8" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.5"/>
    <text x="70" y="77" text-anchor="middle" font-family="Helvetica" font-size="12" font-weight="bold" fill="#333">Trigger</text>
    <text x="70" y="96" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#666">(any N8N trigger)</text>

    <!-- Arrow 1→2 -->
    <line x1="130" y1="82" x2="160" y2="82" stroke="#6C8EBF" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Step 2: AGR Check -->
    <rect x="165" y="55" width="140" height="55" rx="8" ry="8" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="2"/>
    <text x="235" y="77" text-anchor="middle" font-family="Helvetica" font-size="12" font-weight="bold" fill="#333">AGR: Evaluate</text>
    <text x="235" y="96" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#666">POST /governance/evaluate</text>

    <!-- Decision diamond -->
    <polygon points="350,82 385,55 420,82 385,110" fill="#FFF2CC" stroke="#D6B656" stroke-width="2"/>
    <text x="385" y="87" text-anchor="middle" font-family="Helvetica" font-size="10" font-weight="bold" fill="#333">?</text>

    <!-- Arrow 2→diamond -->
    <line x1="305" y1="82" x2="350" y2="82" stroke="#6C8EBF" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Allow path: diamond → Execute -->
    <rect x="460" y="35" width="120" height="50" rx="8" ry="8" fill="#D5E8D4" stroke="#82B366" stroke-width="1.5"/>
    <text x="520" y="57" text-anchor="middle" font-family="Helvetica" font-size="12" font-weight="bold" fill="#2D7600">Execute</text>
    <text x="520" y="73" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#666">Action Node</text>
    <line x1="420" y1="72" x2="460" y2="60" stroke="#82B366" stroke-width="2" marker-end="url(#arrGreen)"/>
    <text x="440" y="58" font-family="Helvetica" font-size="9" fill="#82B366">allow</text>

    <!-- Deny path: diamond → Stop -->
    <rect x="460" y="110" width="120" height="50" rx="8" ry="8" fill="#F8CECC" stroke="#B85450" stroke-width="1.5"/>
    <text x="520" y="133" text-anchor="middle" font-family="Helvetica" font-size="12" font-weight="bold" fill="#AE4132">Stop</text>
    <text x="520" y="149" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#666">Log &amp; notify</text>
    <line x1="420" y1="95" x2="460" y2="120" stroke="#B85450" stroke-width="2" marker-end="url(#arrRed)"/>
    <text x="440" y="118" font-family="Helvetica" font-size="9" fill="#B85450">deny</text>

    <!-- Execute → Audit -->
    <rect x="620" y="35" width="70" height="50" rx="8" ry="8" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.5"/>
    <text x="655" y="55" text-anchor="middle" font-family="Helvetica" font-size="11" font-weight="bold" fill="#333">AGR</text>
    <text x="655" y="72" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#666">Audit</text>
    <line x1="580" y1="60" x2="620" y2="60" stroke="#6C8EBF" stroke-width="2" marker-end="url(#arr)"/>

    <!-- Legend -->
    <text x="350" y="188" text-anchor="middle" font-family="Helvetica" font-size="10" fill="#666">N8N HTTP Request nodes call AGR REST API — no custom plugin needed</text>
  </g>
</svg>
