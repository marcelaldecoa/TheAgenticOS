<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0f2140"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>

    <!-- Glow effects -->
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Radial glow for central kernel -->
    <radialGradient id="kernel-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#4a9eff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>

    <!-- Orbital ring gradient -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#4a9eff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Node gradients -->
    <radialGradient id="node-blue" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#6ab4ff"/>
      <stop offset="100%" stop-color="#2d7dd2"/>
    </radialGradient>
    <radialGradient id="node-cyan" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#5ee7df"/>
      <stop offset="100%" stop-color="#2bb8aa"/>
    </radialGradient>
    <radialGradient id="node-purple" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#b794f6"/>
      <stop offset="100%" stop-color="#7c5cbf"/>
    </radialGradient>
    <radialGradient id="node-gold" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffd97d"/>
      <stop offset="100%" stop-color="#d4a029"/>
    </radialGradient>
    <radialGradient id="node-core" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8ec5fc"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#4a9eff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="700"/>
    <line x1="300" y1="0" x2="300" y2="700"/>
    <line x1="400" y1="0" x2="400" y2="700"/>
    <line x1="500" y1="0" x2="500" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/>
    <line x1="700" y1="0" x2="700" y2="700"/>
    <line x1="800" y1="0" x2="800" y2="700"/>
    <line x1="900" y1="0" x2="900" y2="700"/>
    <line x1="1000" y1="0" x2="1000" y2="700"/>
    <line x1="1100" y1="0" x2="1100" y2="700"/>
  </g>

  <!-- === ABSTRACT OS VISUALIZATION === -->
  <!-- Central kernel glow -->
  <circle cx="600" cy="350" r="200" fill="url(#kernel-glow)"/>
  <circle cx="600" cy="350" r="120" fill="url(#kernel-glow)" opacity="0.5"/>

  <!-- Orbital rings (layers) -->
  <ellipse cx="600" cy="350" rx="260" ry="100" fill="none" stroke="#4a9eff" stroke-width="0.8" opacity="0.2" transform="rotate(-15, 600, 350)"/>
  <ellipse cx="600" cy="350" rx="200" ry="75" fill="none" stroke="#5ee7df" stroke-width="0.8" opacity="0.2" transform="rotate(10, 600, 350)"/>
  <ellipse cx="600" cy="350" rx="310" ry="130" fill="none" stroke="#b794f6" stroke-width="0.6" opacity="0.12" transform="rotate(-5, 600, 350)"/>

  <!-- Connection lines (neural/network pattern) -->
  <g stroke-width="1" opacity="0.35">
    <!-- Core to layer 1 nodes -->
    <line x1="600" y1="350" x2="420" y2="280" stroke="#4a9eff"/>
    <line x1="600" y1="350" x2="780" y2="290" stroke="#4a9eff"/>
    <line x1="600" y1="350" x2="450" y2="440" stroke="#5ee7df"/>
    <line x1="600" y1="350" x2="760" y2="430" stroke="#5ee7df"/>
    <line x1="600" y1="350" x2="600" y2="220" stroke="#b794f6"/>

    <!-- Layer 1 to layer 2 -->
    <line x1="420" y1="280" x2="300" y2="210" stroke="#4a9eff" opacity="0.6"/>
    <line x1="420" y1="280" x2="340" y2="370" stroke="#4a9eff" opacity="0.4"/>
    <line x1="780" y1="290" x2="880" y2="230" stroke="#4a9eff" opacity="0.6"/>
    <line x1="780" y1="290" x2="870" y2="380" stroke="#4a9eff" opacity="0.4"/>
    <line x1="450" y1="440" x2="340" y2="500" stroke="#5ee7df" opacity="0.5"/>
    <line x1="760" y1="430" x2="870" y2="490" stroke="#5ee7df" opacity="0.5"/>
    <line x1="600" y1="220" x2="520" y2="160" stroke="#b794f6" opacity="0.5"/>
    <line x1="600" y1="220" x2="680" y2="160" stroke="#b794f6" opacity="0.5"/>

    <!-- Cross connections -->
    <line x1="420" y1="280" x2="600" y2="220" stroke="#7c5cbf" opacity="0.2"/>
    <line x1="780" y1="290" x2="600" y2="220" stroke="#7c5cbf" opacity="0.2"/>
    <line x1="450" y1="440" x2="760" y2="430" stroke="#2bb8aa" opacity="0.15"/>
    <line x1="300" y1="210" x2="520" y2="160" stroke="#b794f6" opacity="0.2"/>
    <line x1="880" y1="230" x2="680" y2="160" stroke="#b794f6" opacity="0.2"/>

    <!-- Outer connections -->
    <line x1="300" y1="210" x2="180" y2="180" stroke="#4a9eff" opacity="0.2"/>
    <line x1="880" y1="230" x2="980" y2="200" stroke="#4a9eff" opacity="0.2"/>
    <line x1="340" y1="500" x2="220" y2="540" stroke="#5ee7df" opacity="0.2"/>
    <line x1="870" y1="490" x2="970" y2="530" stroke="#5ee7df" opacity="0.2"/>
    <line x1="520" y1="160" x2="480" y2="100" stroke="#b794f6" opacity="0.2"/>
    <line x1="680" y1="160" x2="720" y2="100" stroke="#b794f6" opacity="0.2"/>
  </g>

  <!-- Data flow particles (small dots on connections) -->
  <g fill="#4a9eff" opacity="0.6">
    <circle cx="510" cy="315" r="2"/>
    <circle cx="690" cy="320" r="2"/>
    <circle cx="525" cy="395" r="1.5"/>
    <circle cx="680" cy="390" r="1.5"/>
    <circle cx="360" cy="245" r="1.5"/>
    <circle cx="830" cy="260" r="1.5"/>
  </g>
  <g fill="#5ee7df" opacity="0.5">
    <circle cx="395" cy="470" r="1.5"/>
    <circle cx="815" cy="460" r="1.5"/>
    <circle cx="545" cy="285" r="1.5"/>
  </g>
  <g fill="#b794f6" opacity="0.5">
    <circle cx="560" cy="190" r="1.5"/>
    <circle cx="640" cy="190" r="1.5"/>
    <circle cx="600" cy="285" r="1.5"/>
  </g>

  <!-- Layer 2 nodes (outer) -->
  <g filter="url(#glow-cyan)">
    <circle cx="300" cy="210" r="6" fill="url(#node-blue)" opacity="0.7"/>
    <circle cx="880" cy="230" r="6" fill="url(#node-blue)" opacity="0.7"/>
    <circle cx="340" cy="500" r="5" fill="url(#node-cyan)" opacity="0.6"/>
    <circle cx="870" cy="490" r="5" fill="url(#node-cyan)" opacity="0.6"/>
    <circle cx="520" cy="160" r="5" fill="url(#node-purple)" opacity="0.6"/>
    <circle cx="680" cy="160" r="5" fill="url(#node-purple)" opacity="0.6"/>
    <circle cx="340" cy="370" r="4" fill="url(#node-blue)" opacity="0.5"/>
    <circle cx="870" cy="380" r="4" fill="url(#node-blue)" opacity="0.5"/>
  </g>

  <!-- Outermost faint nodes -->
  <g opacity="0.3">
    <circle cx="180" cy="180" r="3" fill="#4a9eff"/>
    <circle cx="980" cy="200" r="3" fill="#4a9eff"/>
    <circle cx="220" cy="540" r="3" fill="#5ee7df"/>
    <circle cx="970" cy="530" r="3" fill="#5ee7df"/>
    <circle cx="480" cy="100" r="3" fill="#b794f6"/>
    <circle cx="720" cy="100" r="3" fill="#b794f6"/>
  </g>

  <!-- Layer 1 nodes (inner ring) -->
  <g filter="url(#glow-blue)">
    <circle cx="420" cy="280" r="10" fill="url(#node-blue)"/>
    <circle cx="780" cy="290" r="10" fill="url(#node-blue)"/>
    <circle cx="450" cy="440" r="9" fill="url(#node-cyan)"/>
    <circle cx="760" cy="430" r="9" fill="url(#node-cyan)"/>
    <circle cx="600" cy="220" r="9" fill="url(#node-purple)"/>
  </g>

  <!-- Layer labels (tiny, architectural) -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="8" fill="#4a9eff" opacity="0.5" text-anchor="middle">
    <text x="420" y="260">PROCESS</text>
    <text x="780" y="270">MEMORY</text>
    <text x="450" y="465">OPERATOR</text>
    <text x="760" y="455">TOOLS</text>
    <text x="600" y="205">GOVERNANCE</text>
  </g>

  <!-- Central kernel node -->
  <g filter="url(#glow-blue)">
    <circle cx="600" cy="350" r="22" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="600" cy="350" r="15" fill="url(#node-core)" opacity="0.9"/>
  </g>

  <!-- Kernel label -->
  <text x="600" y="355" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="700" fill="#0a1628" text-anchor="middle" letter-spacing="1.5">KERNEL</text>

  <!-- === TITLE AREA === -->
  <!-- Subtle line separator -->
  <line x1="120" y1="590" x2="1080" y2="590" stroke="#4a9eff" stroke-width="0.5" opacity="0.2"/>

  <!-- Title -->
  <text x="600" y="640" font-family="'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="300" fill="#e8f0fe" text-anchor="middle" letter-spacing="6" filter="url(#glow-text)">THE AGENTIC OS</text>

  <!-- Subtitle -->
  <text x="600" y="672" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#4a9eff" text-anchor="middle" letter-spacing="3" opacity="0.7">A PATTERN LANGUAGE FOR INTENT, MEMORY, AND ACTION</text>
</svg>
